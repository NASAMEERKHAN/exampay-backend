<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Payment Receipt</title>

  <style>
    .logo{
    width:70px;
    margin-bottom:10px;
     }

    body{
    font-family:Arial;
    background:#f5f5f5;
    text-align:center;
    padding:40px;
    }

    .receipt{
    background:white;
    padding:30px;
    width:420px;
    margin:auto;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h2{
    color:#003366;
    }

    button{
    margin-top:15px;
    padding:10px 20px;
    background:#003366;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    }

  </style>

</head>

<body>

<div class="receipt">
  <img src="images/logo.png" alt="logo">
  <h2>Sameer Institute of Engineering & Technology</h2>
  <h3>Exam Fee Payment Receipt</h3>

  <hr>

  <p id="student"></p>
  <p id="semester"></p>
  <p id="amount"></p>
  <p id="status"></p>
  <p>Receipt ID: <span id="receiptId"></span></p>
  <p>Date: <span id="date"></span></p>

  <button onclick="window.print()">Print Receipt</button>
  <br>
  <button onclick="goBack()">Back to Dashboard</button>

</div>

<script>

  let roll = localStorage.getItem("studentRoll")
  let sem = localStorage.getItem("receiptSemester")
  let amt = localStorage.getItem("receiptAmount")

  document.getElementById("student").innerText =
  "Student ID: " + roll

  document.getElementById("semester").innerText =
  "Semester: " + sem

  document.getElementById("amount").innerText =
  "Amount Paid:₹" + amt

  document.getElementById("status").innerText =
  "Payment Status: PAID"

  document.getElementById("date").innerText =
  new Date().toLocaleDateString()

  document.getElementById("receiptId").innerText =
  "EXAM-" + Math.floor(Math.random()*100000)

  function goBack(){
  window.location.href="student.html"
  }

  if(!localStorage.getItem("receiptSemester")){
    alert("Receipt not available")
    window.location.href="student.html"
}
</script>

</body>
</html>

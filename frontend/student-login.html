
<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <title>Student Login</title>

  <style>

    body{
    font-family:Arial;
    background:#f2f2f2;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
    }

    .login-container{
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    width:320px;
    }

    h2{
    text-align:center;
    margin-bottom:20px;
    }

    label{
    font-weight:bold;
    }

    input{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:4px;
    }

    button{
    width:100%;
    padding:10px;
    background:#003366;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
    font-size:16px;
    }

    button:hover{
    background:#002244;
    }

  </style>

</head>

<body>

<div class="login-container">

  <h2>Student Login</h2>

  <label>Hall Ticket Number</label>
  <input type="text" id="hallTicket" placeholder="Enter Hall Ticket">

  <label>Password</label>
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="loginStudent()">Login</button>

</div>

<script>

  async function loginStudent(){

  let hallTicket = document.getElementById("hallTicket").value.trim().toUpperCase();
  let password = document.getElementById("password").value.trim();

  if(hallTicket === "" || password === ""){
      alert("Please enter Hall Ticket and Password");
      return;
  }

  try{

  let response = await fetch("https://exampay-backend.onrender.com/student/login", {
      method:"POST",
      headers:{
          "Content-Type":"application/json"
      },
      body: JSON.stringify({
          hallTicketNumber: hallTicket,
          password: password
      })
  }).catch(err=>{
  console.error("FETCH ERROR:",err);
  alert("Backend not reachable");
  });

  let text = await response.text();
  console.log("STATUS:", response.status);
  console.log("RESPONSE:", text);

  if(response.status !== 200){
      alert(text); // 🔥 shows exact backend message
      return;
  }

  let student = JSON.parse(text);

  localStorage.setItem("studentRoll", student.hallTicketNumber);

  window.location.href = "student.html";

  }
  catch(error){
  console.error(error);
  alert("Server error");
  }

  }

</script>

</body>

</html>

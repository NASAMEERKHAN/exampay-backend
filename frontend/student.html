<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Student Dashboard</title>

    <style>

        body{
        margin:0;
        font-family:Arial;
        background:#f5f5f5;
        }

        /* HEADER */

        .topbar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        background:#e9edf1;
        padding:12px 20px;
        }

        .logo-area{
        display:flex;
        align-items:center;
        gap:10px;
        }

        .logo-area img{
        width:40px;
        }

        .college-name{
        font-size:18px;
        font-weight:bold;
        color:#003366;
        }

        /* USER AREA */

        .user-area{
        display:flex;
        align-items:center;
        gap:15px;
        }

        .logout-btn{
        padding:6px 14px;
        background:#d9534f;
        color:white;
        border:none;
        border-radius:5px;
        cursor:pointer;
        }

        /* TITLE BAR */

        .title-bar{
        text-align:center;
        background:#d6dde6;
        padding:15px;
        font-size:22px;
        font-weight:bold;
        color:#1b3a57;
        }

        /* DASHBOARD */

        .dashboard{
        width:800px;
        margin:40px auto;
        background:white;
        padding:20px;
        border-radius:8px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        /* TABLE */

        table{
        width:100%;
        border-collapse:collapse;
        margin-top:20px;
        }

        th,td{
        border:1px solid #ccc;
        padding:10px;
        text-align:center;
        }

        th{
        background:#003366;
        color:white;
        }

        button{
        padding:6px 12px;
        background:#28a745;
        color:white;
        border:none;
        border-radius:4px;
        cursor:pointer;
        }

        button:hover{
        background:#218838;
        }

        /* PAYMENT METHODS */

        .payment-section{
        text-align:center;
        background:#e9edf1;
        padding:60px 20px;
        margin-top:40px;
        }

        .payment-logos{
        display:flex;
        justify-content:center;
        gap:40px;
        flex-wrap:wrap;
        }

        .payment-logos img{
        height:50px;
        }

    </style>

</head>

<body>

<!-- HEADER -->

<div class="topbar">

    <div class="logo-area">
        <img src="images/logo.png">
        <div class="college-name">
            Sameer Institute of Engineering & Technology
        </div>
    </div>

    <div class="user-area">
        <span id="welcomeStudent"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    <div style="position:relative; display:inline-block; cursor:pointer;" onclick="openNotifications()">

        <span style="font-size:20px;">&#128276;</span>

        <span id="notifCount" style="
position:absolute;
top:-5px;
right:-8px;
background:red;
color:white;
font-size:12px;
padding:2px 6px;
border-radius:50%;
display:none;
">
0
</span>

    </div>


</div>

<!-- TITLE -->

<div class="title-bar">
    STUDENT DASHBOARD : EXAM PAYMENT PORTAL
</div>

<!-- DASHBOARD -->
<div id="notificationBox" style="
display:none;
position:fixed;
top:60px;
right:20px;
width:300px;
background:white;
box-shadow:0 0 10px rgba(0,0,0,0.2);
padding:10px;
max-height:400px;
overflow:auto;
border-radius:8px;
">

    <h3>Notifications</h3>
    <div id="notificationList"></div>
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">

        <button onclick="markAllRead()">Mark All Read</button>
        <button onclick="clearAll()">Clear All</button>

    </div>

</div>

<div class="dashboard">

    <h2>Semester Payment Status</h2>

    <table>

        <thead>
        <tr>
            <th>Semester</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Action</th>
            <th>Receipt</th>
        </tr>
        </thead>

        <tbody id="semesterTable"></tbody>

    </table>

</div>

<!-- PAYMENT METHODS -->

<div class="payment-section">

    <h2>Simple & Secure Exam Fee Payment</h2>

    <div class="payment-logos">

        <img src="images/phonepe.png">
        <img src="images/gpay.png">
        <img src="images/upi.png">
        <img src="images/visa.png">
        <img src="images/mastercard.png">
        <img src="images/rupay.png">
        <img src="images/netbanking.png">

    </div>

</div>

<script>

    let roll = localStorage.getItem("studentRoll");

    document.getElementById("welcomeStudent").innerText =
    "Welcome " + roll;

    // 🔔 OPEN NOTIFICATION
    function openNotifications(){

    let box = document.getElementById("notificationBox");

    if(box.style.display === "none"){
        box.style.display = "block";
        loadNotifications();
    }else{
        box.style.display = "none";
    }

    }

    // 🔔 LOAD NOTIFICATIONS
    async function loadNotifications(){

    let res = await fetch(`https://exampay-backend.onrender.com/student/notifications/${roll}`);
    let data = await res.json();

    let list = document.getElementById("notificationList");
    list.innerHTML = "";

    data.forEach(n => {

 list.innerHTML += `
<div style="
border-bottom:1px solid #ccc;
padding:10px;
background:${n.read ? '#fff' : '#e6f7ff'};
">

<div onclick="markRead(${n.id})" style="cursor:pointer;">
<b>${n.message}</b><br>
<small>${formatTime(n.createdAt)}</small>
</div>

<button onclick="deleteNotification(${n.id})"
style="background:red; color:white; margin-top:5px;">
Delete
</button>

</div>
`;

    });

    loadUnreadCount();
    }

    // 🔴 UNREAD COUNT
    async function loadUnreadCount(){

    let res = await fetch(`https://exampay-backend.onrender.com/student/notifications/unread/${roll}`);
    let count = await res.json();

    let badge = document.getElementById("notifCount");

    if(count > 0){
        badge.style.display = "inline-block";
        badge.innerText = count;
    }else{
        badge.style.display = "none";
    }
    }

    // ✔ MARK AS READ
    async function markRead(id){

    await fetch(`https://exampay-backend.onrender.com/student/notifications/read/${id}`, {
        method:"PUT"
    });

    loadNotifications();
    }
    async function deleteNotification(id){
await fetch(`https://exampay-backend.onrender.com/student/notifications/delete/${id}`, {
    method:"PUT"
});
loadNotifications();
}

async function markAllRead(){
await fetch(`https://exampay-backend.onrender.com/student/notifications/read-all/${roll}`, {
    method:"PUT"
});
loadNotifications();
}

async function clearAll(){
await fetch(`https://exampay-backend.onrender.com/student/notifications/clear/${roll}`, {
    method:"PUT"
});
loadNotifications();
}

function formatTime(time){

    if(!time) return "";

    let past = new Date(time +"Z");


    past = new Date(past.getTime() + (5.5 * 60 * 60 * 1000));

    let now = new Date();

    let diff = (now - past) / 1000;

    if(diff < 60) return "Just now";
    if(diff < 3600) return Math.floor(diff/60) + " min ago";
    if(diff < 86400) return Math.floor(diff/3600) + " hrs ago";

    return past.toLocaleString();
}




    // 📊 LOAD PAYMENTS
    fetch("https://exampay-backend.onrender.com/student/payments/" + roll)
    .then(response => response.json())
    .then(data => {

    let table = document.getElementById("semesterTable");
    table.innerHTML = "";

    data.forEach(p => {

    let actionButton = "";
    let receiptButton = "";

    if(p.status === "PAID"){

    actionButton = "✔ Paid";

    receiptButton =
    `<button onclick="viewReceipt('${p.semester}','${p.amount}')">Receipt</button>`;

    }else{

    actionButton =
    `<button onclick="paySemester('${p.semester}',${p.amount})">Pay</button>`;

    receiptButton =
    `<span style="color:gray;">Not Available</span>`;
    }

    let row = `
    <tr>
    <td>${p.semester}</td>
    <td>&#8377;${p.amount}</td>
    <td>${p.status}</td>
    <td>${actionButton}</td>
    <td>${receiptButton}</td>
    </tr>
    `;

    table.innerHTML += row;

    });

    })
    .catch(error => console.error("Fetch error:", error));

    // 💰 PAYMENT
    function paySemester(semester, amount){

    localStorage.setItem("paySemester", semester);
    localStorage.setItem("payAmount", amount);

    window.location.href = "payment.html";
    }

    // 🧾 RECEIPT
    function viewReceipt(semester, amount){

    localStorage.setItem("receiptSemester", semester);
    localStorage.setItem("receiptAmount", amount);

    window.location.href = "receipt.html";
    }

    document.addEventListener("click", function(event){

let box = document.getElementById("notificationBox");
let bell = document.getElementById("notifBell");

if(!box.contains(event.target) && !bell.contains(event.target)){
    box.style.display = "none";
}

});

    // 🚪 LOGOUT
    function logout(){

    localStorage.clear();
    window.location.href = "student-login.html";
    }

    // 🔥 LOAD BADGE ON START
    loadUnreadCount();

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Login - ExamPay</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#f4f6f9;
        }

        .header{
            background:#1e3d59;
            color:white;
            padding:15px;
            text-align:center;
            font-size:22px;
        }

        .login-container{
            width:350px;
            margin:120px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        .login-container h2{
            text-align:center;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:20px;
            background:#1e3d59;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#16324a;
        }

    </style>
</head>

<body>

<div class="header">
    ExamPay Admin Panel
</div>

<div class="login-container">

    <h2>Admin Login</h2>

    <input type="text" id="adminId" placeholder="Enter Admin Username">

    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="loginAdmin()">Login</button>

    <p id="error" style="color:red;text-align:center;"></p>

</div>

<script>

    function loginAdmin(){

    let username = document.getElementById("adminId").value;
    let password = document.getElementById("password").value;

    if(username === "admin" && password === "admin786")
    {
        window.location.href = "admin-dashboard.html";
    }
    else
    {
        document.getElementById("error").innerText = "Invalid Admin Credentials";
    }

    }

</script>

</body>
</html>

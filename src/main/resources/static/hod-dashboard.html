<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HoD Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items:center;
        }
        header div h2{
        margin:0;
        }
        header div p{
        color:#ecf0f1;
        }

        #welcomeText{
        font-size:15px;
        letter-spacing:0.5px;
        }

        .container {
            padding: 20px;
        }

        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            flex: 1;
            padding: 20px;
            border-radius: 10px;
            color: white;
            text-align: center;
        }

        .students { background: #3498db; }
        .paid { background: #2ecc71; }
        .pending { background: #e74c3c; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #34495e;
            color: white;
        }

        button {
            padding: 6px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .logout {
            background: red;
            color: white;
        }

        .hall {
            background: green;
            color: white;
        }
        select{
        padding:6px 10px;
        border-radius:5px;
        border:1px solid #ccc;
        font-size:14px;
        }
 .receipt-btn{
    background: linear-gradient(135deg, #28a745, #20c997);
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 3px 8px rgba(0,0,0,0.2);
}

.receipt-btn:hover{
    transform: scale(1.08);
}

    </style>
</head>

<body>

<header>
    <h2>HoD Dashboard - ExamPay</h2>

    <div style="display:flex; align-items:center; gap:15px;">
        <span id="welcomeText" style="color:white; font-weight:bold;"></span>
        <button class="logout" onclick="logout()">Logout</button>
    </div>
</header>
<div style="text-align:center; margin:20px;">
    <label><b>Filter by Year:</b></label>

    <select id="yearFilter" onchange="filterYearDropdown()">
        <option value="ALL">ALL</option>
        <option value="1">1st Year</option>
        <option value="2">2nd Year</option>
        <option value="3">3rd Year</option>
        <option value="4">4th Year</option>
    </select>
</div>

<div class="container">

    <!-- Cards -->
    <div class="cards">
        <div class="card students">Total Students: <span id="total"></span></div>
        <div class="card paid">Paid: <span id="paid"></span></div>
        <div class="card pending">Pending: <span id="pending"></span></div>
    </div>

    <!-- Table -->
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Dept</th>
            <th>Semester</th>
            <th>Status</th>
            <th>Receipt</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody id="tableBody"></tbody>
    </table>

</div>
<script>
    let dept = localStorage.getItem("hodDept");

    function formatDeptFull(dept){
        if(dept === "CSE_DS") return "CSE(DS)";
        if(dept === "AI_DS") return "AI&DS";
        return dept;
    }

    let formatted = formatDeptFull(dept);

    document.getElementById("welcomeText").innerText =
        "Welcome " + formatted + " HoD";

        // 🔥 LOAD DATA
        fetch(`http://localhost:8080/student/hod-notifications/${dept}`)
        .then(res => res.json())
        .then(data => {
        allNotifications = data;
        renderTable(data);
        })
        .catch(err => console.error("Fetch Error:", err));


        // 🔥 RENDER TABLE
        function renderTable(data){
        let table = document.getElementById("tableBody");
        table.innerHTML = "";

        data.forEach(n => {
        table.innerHTML += `
        <tr>
            <td>${n.studentId}</td>
            <td>${formatDept(n.receiver)}</td>
            <td>${n.semester}</td>
            <td>PAID</td>
            <td>
                <button class="receipt-btn" onclick="viewReceipt('${n.studentId}','${n.semester}')">
                    Receipt
                </button>
            </td>
            <td>
                <button class="hall" onclick="issueHallTicket('${n.studentId}',${n.id}, this)">
                    Issue Hall Ticket
                </button>
            </td>
        </tr>`;
        });

        updateCards(data);
        }


        // 🔥 YEAR FILTER
        function filterYearDropdown(){

        let year = document.getElementById("yearFilter").value;

        if(year === "ALL"){
        renderTable(allNotifications);
        return;
        }

        let filtered = allNotifications.filter(n => {

        if(year == "1") return n.semester === "1-1" || n.semester === "1-2";
        if(year == "2") return n.semester === "2-1" || n.semester === "2-2";
        if(year == "3") return n.semester === "3-1" || n.semester === "3-2";
        if(year == "4") return n.semester === "4-1" || n.semester === "4-2";

        });

        renderTable(filtered);
        }


        // 🔥 CARDS
        function updateCards(data){
        document.getElementById("total").innerText = data.length;
        document.getElementById("paid").innerText = data.length;
        document.getElementById("pending").innerText = 0;
        }


        // 🔥 FORMAT
        function formatDept(dept){
        if(dept === "CSE_DS") return "CSE (DS)";
        if(dept === "AI_DS") return "AI & DS";
        return dept;
        }


        // 🔥 RECEIPT
        function viewReceipt(studentId, semester){
        localStorage.setItem("receiptSemester", semester);
        localStorage.setItem("receiptAmount", 8750);
        localStorage.setItem("studentRoll", studentId);
        window.location.href = "receipt.html";
        }


        // 🔥 ISSUE HALL TICKET

        async function issueHallTicket(studentId, id, btn){

             console.log("Clicked ID:",id);

            await fetch(`http://localhost:8080/notification/hide/${id}`, {
                method: "PUT"
            });

            btn.closest("tr").remove();

            alert(`Hall Ticket issued for ${studentId}`);
        }

        // 🔥 LOGOUT (NOW WORKS)
        function logout(){
        localStorage.clear();
        window.location.href = "hod-login.html";
        }
</script>


</body>
</html>
